<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de NC — Obra</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1e2333;
  --border: #2a2f45;
  --accent: #f59e0b;
  --accent2: #ef4444;
  --text: #e8eaf0;
  --muted: #6b7280;
  --aberta: #f59e0b;
  --andamento: #3b82f6;
  --concluida: #22c55e;
  --vencida: #ef4444;
  --semretorno: #8b5cf6;
}

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(245,158,11,0.08), transparent);
}

/* ── HEADER ── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(15,17,23,0.92);
  backdrop-filter: blur(12px);
}
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #fff;
  line-height: 1;
}
.logo-text p {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-top: 2px;
}
.btn-nova {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 9px 20px;
  border-radius: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-nova:hover { background: #fbbf24; transform: translateY(-1px); }

/* ── KPI CARDS ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  padding: 20px 28px 0;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s;
}
.kpi:hover { transform: translateY(-2px); }
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--kpi-color, var(--accent));
}
.kpi-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
}
.kpi-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--kpi-color, var(--accent));
  line-height: 1;
  margin-top: 6px;
}
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.kpi.total { --kpi-color: #e8eaf0; }
.kpi.aberta { --kpi-color: var(--aberta); }
.kpi.andamento { --kpi-color: var(--andamento); }
.kpi.concluida { --kpi-color: var(--concluida); }
.kpi.vencida { --kpi-color: var(--vencida); }

/* ── TOOLBAR ── */
.toolbar {
  padding: 16px 28px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
}
.search-wrap svg {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
}
.search-wrap input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Barlow', sans-serif;
  outline: none;
  transition: border 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }

.filter-select {
  padding: 9px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Barlow', sans-serif;
  outline: none;
  cursor: pointer;
  transition: border 0.2s;
}
.filter-select:focus { border-color: var(--accent); }

/* ── BULK BAR ── */
.bulk-bar {
  display: none;
  margin: 0 28px 12px;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 10px 16px;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.bulk-bar.on { display: flex; }
.bulk-info {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.bulk-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-bulk {
  padding: 7px 14px;
  border: none;
  border-radius: 7px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-bulk.concluir { background: var(--concluida); color: #000; }
.btn-bulk.abrir { background: var(--aberta); color: #000; }
.btn-bulk.excluir-lote { background: rgba(239,68,68,0.15); color: var(--vencida); border: 1px solid var(--vencida); }
.btn-bulk.cancelar { background: rgba(255,255,255,0.07); color: var(--muted); }

/* ── TABLE ── */
.table-wrap {
  padding: 0 28px 32px;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: var(--surface);
  padding: 10px 14px;
  text-align: left;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
thead th:first-child { border-radius: 10px 0 0 0; }
thead th:last-child { border-radius: 0 10px 0 0; }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  cursor: pointer;
}
tbody tr:hover td { background: var(--surface2); }
tbody tr.selected td { background: rgba(245,158,11,0.06); }
tbody tr:last-child td { border-bottom: none; }
td {
  padding: 12px 14px;
  vertical-align: middle;
  color: var(--text);
}
table {
  background: var(--surface);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.nc-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.nc-desc {
  max-width: 220px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #c8cad4;
}
.nc-resp { color: #a0a4b8; font-size: 12px; }
.nc-disc {
  display: inline-block;
  padding: 3px 9px;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  font-size: 11px;
  color: #8890a8;
  white-space: nowrap;
}
.prazo-ok { color: #6b7280; font-size: 12px; }
.prazo-alert { color: var(--vencida); font-size: 12px; font-weight: 700; }
.prazo-soon { color: var(--aberta); font-size: 12px; font-weight: 600; }

/* STATUS BADGES */
.badge-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 11px;
  border-radius: 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.badge-status.aberta { background: rgba(245,158,11,0.15); color: var(--aberta); }
.badge-status.aberta:hover { background: rgba(245,158,11,0.25); }
.badge-status.andamento { background: rgba(59,130,246,0.15); color: var(--andamento); }
.badge-status.andamento:hover { background: rgba(59,130,246,0.25); }
.badge-status.concluida { background: rgba(34,197,94,0.15); color: var(--concluida); }
.badge-status.concluida:hover { background: rgba(34,197,94,0.25); }
.badge-status.vencida { background: rgba(239,68,68,0.15); color: var(--vencida); }
.badge-status.vencida:hover { background: rgba(239,68,68,0.25); }
.badge-status.semretorno { background: rgba(139,92,246,0.15); color: var(--semretorno); }
.badge-status.semretorno:hover { background: rgba(139,92,246,0.25); }

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.aberta .status-dot { background: var(--aberta); }
.andamento .status-dot { background: var(--andamento); box-shadow: 0 0 6px var(--andamento); animation: pulse 1.5s infinite; }
.concluida .status-dot { background: var(--concluida); }
.vencida .status-dot { background: var(--vencida); animation: pulse 1s infinite; }
.semretorno .status-dot { background: var(--semretorno); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.btn-row {
  display: flex; gap: 4px;
}
.btn-icon {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 7px;
  font-size: 14px;
  line-height: 1;
  transition: all 0.2s;
}
.btn-icon:hover { border-color: var(--border); color: var(--text); }
.btn-icon.del:hover { border-color: var(--vencida); color: var(--vencida); background: rgba(239,68,68,0.08); }
.btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); background: rgba(245,158,11,0.08); }

input[type=checkbox] {
  width: 16px; height: 16px;
  cursor: pointer;
  accent-color: var(--accent);
}

.empty-state {
  padding: 64px 20px;
  text-align: center;
  color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 14px; line-height: 1.7; }
.empty-state strong { color: var(--accent); }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.overlay.on { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 520px;
  max-width: 96vw;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: modalUp 0.22s ease;
}
@keyframes modalUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
}
.btn-close {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 20px;
  line-height: 1;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all 0.2s;
}
.btn-close:hover { color: var(--text); background: var(--surface2); }

.fg { margin-bottom: 14px; }
.fg label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  margin-bottom: 6px;
}
.fg input, .fg select, .fg textarea {
  width: 100%;
  padding: 10px 13px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Barlow', sans-serif;
  outline: none;
  transition: border 0.2s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); }
.fg textarea { resize: vertical; min-height: 72px; }
.fg select option { background: var(--surface); }

.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; margin-top: 22px; }
.btn-cancel {
  flex: 1;
  padding: 11px;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--text); color: var(--text); }
.btn-save {
  flex: 2;
  padding: 11px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 9px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-save:hover { background: #fbbf24; }
.btn-save:disabled { background: #6b5a2a; color: #9d8a50; cursor: not-allowed; }

/* ── VIEW MODAL ── */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; margin-bottom: 20px; }
.detail-item label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  display: block;
  margin-bottom: 4px;
}
.detail-item p {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
}
.detail-item.full { grid-column: 1 / -1; }
.detail-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  z-index: 500;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── FOTO PREVIEW ── */
.foto-preview {
  width: 100%;
  max-height: 160px;
  object-fit: cover;
  border-radius: 8px;
  margin-top: 8px;
  border: 1px solid var(--border);
  display: none;
}
.foto-preview.on { display: block; }
.foto-detail {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid var(--border);
  margin-top: 8px;
}

@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .modal-grid { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .header { padding: 0 16px; }
  .kpi-grid, .toolbar, .table-wrap { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">⚠️</div>
    <div class="logo-text">
      <h1>Controle de NC</h1>
      <p id="sub-label">Não Conformidades da Obra</p>
    </div>
  </div>
  <button class="btn-nova" onclick="abrirModal()">
    <span>+</span> Nova NC
  </button>
</header>

<!-- KPI CARDS -->
<div class="kpi-grid">
  <div class="kpi total">
    <div class="kpi-label">Total</div>
    <div class="kpi-value" id="k-total">0</div>
    <div class="kpi-sub">não conformidades</div>
  </div>
  <div class="kpi aberta">
    <div class="kpi-label">Abertas</div>
    <div class="kpi-value" id="k-aberta">0</div>
    <div class="kpi-sub">aguardando ação</div>
  </div>
  <div class="kpi andamento">
    <div class="kpi-label">Em Andamento</div>
    <div class="kpi-value" id="k-andamento">0</div>
    <div class="kpi-sub">em tratamento</div>
  </div>
  <div class="kpi concluida">
    <div class="kpi-label">Concluídas</div>
    <div class="kpi-value" id="k-concluida">0</div>
    <div class="kpi-sub">resolvidas</div>
  </div>
  <div class="kpi vencida">
    <div class="kpi-label">Vencidas</div>
    <div class="kpi-value" id="k-vencida">0</div>
    <div class="kpi-sub">prazo expirado</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="busca" placeholder="Buscar NC, responsável, descrição..." oninput="renderizar()">
  </div>
  <select class="filter-select" id="fil-status" onchange="renderizar()">
    <option value="">Todos os status</option>
    <option value="aberta">Aberta</option>
    <option value="andamento">Em Andamento</option>
    <option value="concluida">Concluída</option>
    <option value="vencida">Vencida</option>
    <option value="semretorno">Sem Retorno</option>
  </select>
  <select class="filter-select" id="fil-disciplina" onchange="renderizar()">
    <option value="">Todas as áreas</option>
  </select>
  <button class="filter-select" onclick="exportarCSV()" style="cursor:pointer;white-space:nowrap;letter-spacing:0.3px">⬇ Exportar CSV</button>
</div>

<!-- BULK BAR -->
<div class="bulk-bar" id="bulk-bar">
  <span class="bulk-info" id="bulk-info">0 NCs selecionadas</span>
  <div class="bulk-actions">
    <button class="btn-bulk concluir" onclick="marcarLote('concluida')">✔ Concluir</button>
    <button class="btn-bulk abrir" onclick="marcarLote('aberta')">↺ Reabrir</button>
    <button class="btn-bulk excluir-lote" onclick="excluirLote()">✕ Excluir</button>
    <button class="btn-bulk cancelar" onclick="limparSelecao()">Cancelar</button>
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <div id="area"></div>
</div>

<!-- MODAL FORMULÁRIO -->
<div class="overlay" id="overlay" onclick="fecharSeFora(event,'overlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-titulo">Nova NC</div>
      <button class="btn-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-grid">
      <div class="fg">
        <label>Número da NC</label>
        <input type="text" id="f-num" placeholder="Ex: NC-001">
      </div>
      <div class="fg">
        <label>Data de Abertura</label>
        <input type="date" id="f-data">
      </div>
    </div>
    <div class="fg">
      <label>Descrição do Problema</label>
      <textarea id="f-desc" placeholder="Descreva a não conformidade..."></textarea>
    </div>
    <div class="modal-grid">
      <div class="fg">
        <label>Responsável</label>
        <input type="text" id="f-resp" placeholder="Nome do responsável">
      </div>
      <div class="fg">
        <label>Disciplina / Área</label>
        <input type="text" id="f-disc" placeholder="Ex: Estrutura, Elétrica...">
      </div>
    </div>
    <div class="modal-grid">
      <div class="fg">
        <label>Prazo para Resolução</label>
        <input type="date" id="f-prazo">
      </div>
      <div class="fg">
        <label>Status</label>
        <select id="f-status">
          <option value="aberta">🟡 Aberta</option>
          <option value="andamento">🔵 Em Andamento</option>
          <option value="concluida">🟢 Concluída</option>
          <option value="vencida">🔴 Vencida</option>
          <option value="semretorno">🟣 Sem Retorno</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label>Ação Corretiva</label>
      <textarea id="f-acao" placeholder="Descreva a ação corretiva tomada ou planejada..."></textarea>
    </div>
    <div class="fg">
      <label>Foto / Evidência</label>
      <input type="file" id="f-foto" accept="image/*" onchange="previewFoto()">
      <img class="foto-preview" id="foto-preview" src="" alt="preview">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="salvar()">Salvar NC</button>
    </div>
  </div>
</div>

<!-- MODAL VISUALIZAÇÃO -->
<div class="overlay" id="overlay-view" onclick="fecharSeFora(event,'overlay-view')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="view-num">NC-000</div>
      <button class="btn-close" onclick="fecharView()">✕</button>
    </div>
    <div class="detail-grid" id="view-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharView()">Fechar</button>
      <button class="btn-save" id="btn-editar-view" onclick="editarDaView()">✏ Editar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'nc-obra-v1';
let dados = carregarDados();
let selecionados = new Set();
let editandoId = null;
let viewingId = null;

function carregarDados() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function salvarDados() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
}

// ── STATUS CONFIG ─────────────────────────────────
const STATUS_CONFIG = {
  aberta:     { label: '🟡 Aberta',       cls: 'aberta' },
  andamento:  { label: '🔵 Em Andamento', cls: 'andamento' },
  concluida:  { label: '🟢 Concluída',    cls: 'concluida' },
  vencida:    { label: '🔴 Vencida',      cls: 'vencida' },
  semretorno: { label: '🟣 Sem Retorno',  cls: 'semretorno' }
};
const STATUS_CICLO = ['aberta','andamento','concluida','vencida','semretorno'];

// ── KPIs ──────────────────────────────────────────
function atualizarKPIs() {
  const d = dados;
  document.getElementById('k-total').textContent = d.length;
  document.getElementById('k-aberta').textContent = d.filter(r=>r.status==='aberta').length;
  document.getElementById('k-andamento').textContent = d.filter(r=>r.status==='andamento').length;
  document.getElementById('k-concluida').textContent = d.filter(r=>r.status==='concluida').length;
  document.getElementById('k-vencida').textContent = d.filter(r=>(r.status==='vencida'||r.status==='semretorno')).length;
}

// ── DISCIPLINAS FILTER ────────────────────────────
function atualizarFiltroDisc() {
  const sel = document.getElementById('fil-disciplina');
  const val = sel.value;
  const discs = [...new Set(dados.map(r=>r.disciplina).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Todas as áreas</option>' + discs.map(d=>`<option value="${d}"${val===d?' selected':''}>${d}</option>`).join('');
}

// ── RENDER ────────────────────────────────────────
function renderizar() {
  const busca = document.getElementById('busca').value.toLowerCase();
  const filStatus = document.getElementById('fil-status').value;
  const filDisc = document.getElementById('fil-disciplina').value;

  let filtrado = dados.filter(r => {
    const okStatus = !filStatus || r.status === filStatus;
    const okDisc = !filDisc || r.disciplina === filDisc;
    const okBusca = !busca ||
      (r.num||'').toLowerCase().includes(busca) ||
      (r.desc||'').toLowerCase().includes(busca) ||
      (r.resp||'').toLowerCase().includes(busca) ||
      (r.disciplina||'').toLowerCase().includes(busca) ||
      (r.acao||'').toLowerCase().includes(busca);
    return okStatus && okDisc && okBusca;
  }).sort((a,b) => (b.dataAbertura||'').localeCompare(a.dataAbertura||''));

  atualizarKPIs();
  atualizarFiltroDisc();

  const area = document.getElementById('area');
  if (!filtrado.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>${dados.length ? 'Nenhuma NC encontrada para este filtro.' : 'Nenhuma NC registrada ainda.<br>Clique em <strong>+ Nova NC</strong> para começar.'}</p></div>`;
    return;
  }

  const hoje = new Date(); hoje.setHours(0,0,0,0);

  const linhas = filtrado.map(r => {
    const sc = STATUS_CONFIG[r.status] || STATUS_CONFIG.aberta;
    const prazoHtml = prazoHtml_(r, hoje);
    const foto = r.foto ? '📷' : '';
    return `
      <tr id="row-${r.id}" class="${selecionados.has(r.id)?'selected':''}" onclick="verNC('${r.id}')">
        <td onclick="event.stopPropagation()"><input type="checkbox" ${selecionados.has(r.id)?'checked':''} onchange="toggleSelecao('${r.id}',this)"></td>
        <td><span class="nc-num">${r.num||'—'}</span></td>
        <td><span class="nc-desc" title="${r.desc||''}">${r.desc||'—'}</span></td>
        <td><span class="nc-resp">${r.resp||'—'}</span></td>
        <td><span class="nc-disc">${r.disciplina||'—'}</span></td>
        <td>${prazoHtml}</td>
        <td><button class="badge-status ${sc.cls}" onclick="event.stopPropagation();ciclarStatus('${r.id}')"><span class="status-dot"></span>${sc.label.replace(/^\S+\s/,'')}</button></td>
        <td>${foto}</td>
        <td onclick="event.stopPropagation()">
          <div class="btn-row">
            <button class="btn-icon edit" onclick="editarNC('${r.id}')" title="Editar">✏</button>
            <button class="btn-icon del" onclick="excluir('${r.id}')" title="Excluir">✕</button>
          </div>
        </td>
      </tr>`;
  }).join('');

  area.innerHTML = `
    <table>
      <thead><tr>
        <th><input type="checkbox" id="chk-all" onchange="toggleTodos(this)" title="Selecionar todos"></th>
        <th>Nº NC</th>
        <th>Descrição</th>
        <th>Responsável</th>
        <th>Área</th>
        <th>Prazo</th>
        <th>Status</th>
        <th></th>
        <th>Ações</th>
      </tr></thead>
      <tbody>${linhas}</tbody>
    </table>`;
}

function prazoHtml_(r, hoje) {
  if (!r.prazo) return '<span class="prazo-ok">—</span>';
  const p = new Date(r.prazo + 'T00:00:00');
  const diff = Math.ceil((p - hoje) / 86400000);
  const fmtP = fmtData(r.prazo);
  if (r.status === 'concluida') return `<span class="prazo-ok">${fmtP}</span>`;
  if (diff < 0) return `<span class="prazo-alert">⚠ ${fmtP}</span>`;
  if (diff <= 3) return `<span class="prazo-soon">⏰ ${fmtP}</span>`;
  return `<span class="prazo-ok">${fmtP}</span>`;
}

function fmtData(d) {
  if (!d) return '—';
  const [a,m,dia] = d.split('-');
  return `${dia}/${m}/${a}`;
}

// ── SELEÇÃO ───────────────────────────────────────
function toggleSelecao(id, chk) {
  if (chk.checked) selecionados.add(id); else selecionados.delete(id);
  document.getElementById('row-'+id)?.classList.toggle('selected', chk.checked);
  atualizarBulkBar();
}
function toggleTodos(chk) {
  const busca = document.getElementById('busca').value.toLowerCase();
  const filStatus = document.getElementById('fil-status').value;
  const filDisc = document.getElementById('fil-disciplina').value;
  dados.filter(r => {
    const okS = !filStatus || r.status===filStatus;
    const okD = !filDisc || r.disciplina===filDisc;
    const okB = !busca || (r.num||'').toLowerCase().includes(busca)||(r.desc||'').toLowerCase().includes(busca)||(r.resp||'').toLowerCase().includes(busca);
    return okS&&okD&&okB;
  }).forEach(r => {
    if (chk.checked) selecionados.add(r.id); else selecionados.delete(r.id);
    const row = document.getElementById('row-'+r.id);
    if (row) { row.classList.toggle('selected', chk.checked); const cb=row.querySelector('input[type=checkbox]'); if(cb)cb.checked=chk.checked; }
  });
  atualizarBulkBar();
}
function limparSelecao() { selecionados.clear(); renderizar(); atualizarBulkBar(); }
function atualizarBulkBar() {
  const n = selecionados.size;
  const bar = document.getElementById('bulk-bar');
  document.getElementById('bulk-info').textContent = n + ' NC' + (n!==1?'s':'') + ' selecionada' + (n!==1?'s':'');
  bar.classList.toggle('on', n>0);
}

// ── LOTE ──────────────────────────────────────────
function marcarLote(novoStatus) {
  if (!selecionados.size) return;
  selecionados.forEach(id => { const r=dados.find(x=>x.id===id); if(r)r.status=novoStatus; });
  salvarDados(); selecionados.clear(); renderizar(); atualizarBulkBar();
  toast(`✔ ${selecionados.size || 'NCs'} atualizadas`);
}
function excluirLote() {
  if (!selecionados.size || !confirm(`Excluir ${selecionados.size} NC(s)?`)) return;
  dados = dados.filter(r=>!selecionados.has(r.id));
  salvarDados(); selecionados.clear(); renderizar(); atualizarBulkBar();
  toast('🗑 NCs excluídas');
}

// ── CICLAR STATUS ─────────────────────────────────
function ciclarStatus(id) {
  const r = dados.find(x=>x.id===id);
  if (!r) return;
  const idx = STATUS_CICLO.indexOf(r.status);
  r.status = STATUS_CICLO[(idx+1)%STATUS_CICLO.length];
  salvarDados(); renderizar();
  toast(`Status atualizado: ${STATUS_CONFIG[r.status].label}`);
}

// ── EXCLUIR ───────────────────────────────────────
function excluir(id) {
  if (!confirm('Excluir esta NC?')) return;
  dados = dados.filter(r=>r.id!==id);
  selecionados.delete(id);
  salvarDados(); renderizar(); atualizarBulkBar();
  toast('🗑 NC excluída');
}

// ── VISUALIZAR ────────────────────────────────────
function verNC(id) {
  const r = dados.find(x=>x.id===id);
  if (!r) return;
  viewingId = id;
  document.getElementById('view-num').textContent = r.num || 'NC';
  const sc = STATUS_CONFIG[r.status]||STATUS_CONFIG.aberta;
  document.getElementById('view-body').innerHTML = `
    <div class="detail-item"><label>Número</label><p>${r.num||'—'}</p></div>
    <div class="detail-item"><label>Data de Abertura</label><p>${fmtData(r.dataAbertura)}</p></div>
    <div class="detail-item full"><label>Descrição do Problema</label><p>${r.desc||'—'}</p></div>
    <div class="detail-item"><label>Responsável</label><p>${r.resp||'—'}</p></div>
    <div class="detail-item"><label>Disciplina / Área</label><p>${r.disciplina||'—'}</p></div>
    <div class="detail-item"><label>Prazo</label><p>${fmtData(r.prazo)}</p></div>
    <div class="detail-item"><label>Status</label><p><span class="badge-status ${sc.cls}" style="cursor:default"><span class="status-dot"></span>${sc.label.replace(/^\S+\s/,'')}</span></p></div>
    <div class="detail-item full"><label>Ação Corretiva</label><p>${r.acao||'—'}</p></div>
    ${r.foto ? `<div class="detail-item full"><label>Foto / Evidência</label><img class="foto-detail" src="${r.foto}" alt="evidência"></div>` : ''}
  `;
  document.getElementById('overlay-view').classList.add('on');
}
function fecharView() { document.getElementById('overlay-view').classList.remove('on'); viewingId=null; }
function editarDaView() { fecharView(); editarNC(viewingId||''); }

// ── MODAL ─────────────────────────────────────────
function abrirModal(id) {
  editandoId = id || null;
  document.getElementById('modal-titulo').textContent = id ? '✏ Editar NC' : 'Nova NC';
  if (id) {
    const r = dados.find(x=>x.id===id);
    if (!r) return;
    document.getElementById('f-num').value = r.num||'';
    document.getElementById('f-data').value = r.dataAbertura||'';
    document.getElementById('f-desc').value = r.desc||'';
    document.getElementById('f-resp').value = r.resp||'';
    document.getElementById('f-disc').value = r.disciplina||'';
    document.getElementById('f-prazo').value = r.prazo||'';
    document.getElementById('f-status').value = r.status||'aberta';
    document.getElementById('f-acao').value = r.acao||'';
    const prev = document.getElementById('foto-preview');
    if (r.foto) { prev.src=r.foto; prev.classList.add('on'); } else { prev.classList.remove('on'); prev.src=''; }
  } else {
    document.getElementById('f-num').value = proximoNum();
    document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-desc').value = '';
    document.getElementById('f-resp').value = '';
    document.getElementById('f-disc').value = '';
    document.getElementById('f-prazo').value = '';
    document.getElementById('f-status').value = 'aberta';
    document.getElementById('f-acao').value = '';
    document.getElementById('f-foto').value = '';
    document.getElementById('foto-preview').classList.remove('on');
    document.getElementById('foto-preview').src = '';
  }
  document.getElementById('overlay').classList.add('on');
}
function fecharModal() { document.getElementById('overlay').classList.remove('on'); editandoId=null; }
function fecharSeFora(e, id) { if(e.target===document.getElementById(id)) { id==='overlay'?fecharModal():fecharView(); } }

function editarNC(id) { abrirModal(id); }

function proximoNum() {
  if (!dados.length) return 'NC-001';
  const nums = dados.map(r=>{
    const m = (r.num||'').match(/(\d+)$/);
    return m ? parseInt(m[1]) : 0;
  });
  const prox = Math.max(...nums) + 1;
  return 'NC-' + String(prox).padStart(3,'0');
}

function previewFoto() {
  const file = document.getElementById('f-foto').files[0];
  const prev = document.getElementById('foto-preview');
  if (!file) { prev.classList.remove('on'); return; }
  const reader = new FileReader();
  reader.onload = e => { prev.src=e.target.result; prev.classList.add('on'); };
  reader.readAsDataURL(file);
}

async function salvar() {
  const num = document.getElementById('f-num').value.trim();
  const dataAbertura = document.getElementById('f-data').value;
  const desc = document.getElementById('f-desc').value.trim();
  const resp = document.getElementById('f-resp').value.trim();
  const disciplina = document.getElementById('f-disc').value.trim();
  const prazo = document.getElementById('f-prazo').value;
  const status = document.getElementById('f-status').value;
  const acao = document.getElementById('f-acao').value.trim();

  if (!num || !dataAbertura || !desc) { toast('⚠️ Preencha ao menos: Nº, Data e Descrição'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Salvando...';

  let foto = '';
  const fotoFile = document.getElementById('f-foto').files[0];
  if (fotoFile) {
    foto = await new Promise(res => {
      const fr = new FileReader();
      fr.onload = e => res(e.target.result);
      fr.readAsDataURL(fotoFile);
    });
  } else if (editandoId) {
    const old = dados.find(x=>x.id===editandoId);
    if (old) foto = old.foto || '';
  }

  if (editandoId) {
    const idx = dados.findIndex(x=>x.id===editandoId);
    if (idx>=0) dados[idx] = { ...dados[idx], num, dataAbertura, desc, resp, disciplina, prazo, status, acao, foto };
    toast('✅ NC atualizada!');
  } else {
    dados.push({ id: crypto.randomUUID(), num, dataAbertura, desc, resp, disciplina, prazo, status, acao, foto, criadaEm: new Date().toISOString() });
    toast('✅ NC registrada com sucesso!');
  }

  salvarDados(); renderizar(); fecharModal();
  btn.disabled = false; btn.textContent = 'Salvar NC';
}

// ── EXPORTAR CSV ─────────────────────────────────
function exportarCSV() {
  if (!dados.length) { toast('⚠️ Nenhuma NC para exportar'); return; }
  const cols = ['Nº NC','Data Abertura','Descrição','Responsável','Disciplina','Prazo','Status','Ação Corretiva'];
  const linhas = dados.map(r => [
    r.num, r.dataAbertura, r.desc, r.resp, r.disciplina, r.prazo,
    STATUS_CONFIG[r.status]?.label.replace(/^\S+\s/,'') || r.status, r.acao
  ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = [cols.join(','), ...linhas].join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `controle-nc-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  toast('📥 CSV exportado!');
}

// ── TOAST ─────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────
renderizar();
</script>
</body>
</html>
